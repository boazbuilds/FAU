name: CI

# Draait op elke pull request: tests + build (incl. content-validatie).
# De deploy naar GitHub Pages staat los hiervan (alleen op push naar main).
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
